<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#2563EB">
  <title>Leaderboard | Move Church Hunt</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
  <a href="index.html" class="back-btn">← Back</a>
  <div style="flex:1;text-align:center;">
    <div class="header-title">🏆 Leaderboard</div>
    <div class="header-sub">Move Church Kids Hunt</div>
  </div>
  <button onclick="loadLeaderboard()" style="background:rgba(255,255,255,.2);border:none;color:white;padding:7px 11px;border-radius:8px;cursor:pointer;font-size:18px;" title="Refresh">↻</button>
</div>

<div class="container">

  <!-- My team callout -->
  <div id="my-team-card" style="display:none;" class="card" style="border:2px solid #2563EB;">
    <div style="font-size:12px;color:#64748B;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Your Team</div>
    <div id="my-team-name" style="font-size:20px;font-weight:800;color:#1E293B;"></div>
    <div id="my-team-status" style="font-size:14px;color:#64748B;margin-top:2px;"></div>
  </div>

  <!-- Loading -->
  <div id="loading" class="card text-center" style="padding:48px 20px;">
    <div style="font-size:36px;margin-bottom:12px;">⏳</div>
    <div style="color:#64748B;font-size:16px;">Loading leaderboard...</div>
  </div>

  <!-- No script configured -->
  <div id="no-script" style="display:none;" class="card">
    <div class="alert alert-warn mb-0">
      ⚠️ The live leaderboard needs Google Apps Script setup. See the <strong>Admin</strong> page for instructions, or check the Google Sheet directly after setup.
    </div>
  </div>

  <!-- Empty state -->
  <div id="empty-state" style="display:none;" class="card text-center" style="padding:48px 20px;">
    <div style="font-size:48px;margin-bottom:12px;">🏃</div>
    <div style="font-weight:800;font-size:18px;margin-bottom:6px;">No finishers yet!</div>
    <div style="color:#64748B;font-size:15px;">Be the first team to complete the hunt!</div>
  </div>

  <!-- Leaderboard list -->
  <div id="leaderboard-list" style="display:none;"></div>

  <div style="text-align:center;margin-top:8px;">
    <a href="index.html" class="btn btn-outline" style="max-width:240px;margin:0 auto;">🗺️ Back to Map</a>
  </div>

</div>

<script src="js/app.js"></script>
<script>
  window.addEventListener("DOMContentLoaded", function() {
    var team = getTeam();
    if (team) {
      document.getElementById("my-team-card").style.display = "block";
      document.getElementById("my-team-name").textContent = team.name;
      var status = isComplete() ? "✅ Hunt completed!" : "🔍 Hunt in progress (" + visitedCount() + "/5 locations found)";
      document.getElementById("my-team-status").textContent = status;
    }
    loadLeaderboard();
  });

  async function loadLeaderboard() {
    document.getElementById("loading").style.display = "block";
    document.getElementById("leaderboard-list").style.display = "none";
    document.getElementById("empty-state").style.display = "none";
    document.getElementById("no-script").style.display = "none";

    if (!HUNT_CONFIG.scriptUrl) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("no-script").style.display = "block";
      return;
    }

    var entries = await fetchLeaderboard();
    document.getElementById("loading").style.display = "none";

    if (!entries || entries.length === 0) {
      document.getElementById("empty-state").style.display = "block";
      return;
    }

    var myTeam = getTeam();
    var html = "";
    entries.forEach(function(entry) {
      var isMe = myTeam && myTeam.name === entry.team;
      var medal = entry.rank === 1 ? "🥇" : entry.rank === 2 ? "🥈" : entry.rank === 3 ? "🥉" : null;
      var rankContent = medal ? medal : entry.rank;
      var rankClass = entry.rank === 1 ? "rank-1" : entry.rank === 2 ? "rank-2" : entry.rank === 3 ? "rank-3" : "rank-other";

      html += '<div class="leaderboard-row' + (isMe ? " mine" : "") + '">' +
        '<div class="leaderboard-rank ' + rankClass + '">' + rankContent + "</div>" +
        '<div class="leaderboard-team">' + escapeHtml(entry.team) + (isMe ? " 👈" : "") + "</div>" +
        '<div class="leaderboard-time">' + entry.time + "</div>" +
        "</div>";
    });

    document.getElementById("leaderboard-list").innerHTML = html;
    document.getElementById("leaderboard-list").style.display = "block";
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
</script>

</body>
</html>
